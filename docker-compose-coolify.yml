services:
  tailscale:
    image: tailscale/tailscale:latest
    hostname: paperclip
    environment:
      - TS_AUTHKEY=${TS_AUTH_KEY}
      - TS_EXTRA_ARGS=--advertise-tags=tag:container
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
    volumes:
      - ./tailscale-nginx/state:/var/lib/tailscale
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
      - net_raw
    restart: unless-stopped
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: paperclip
      POSTGRES_PASSWORD: ${SERVICE_PASSWORD_POSTGRES}
      POSTGRES_DB: paperclip
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperclip -d paperclip"]
      interval: 2s
      timeout: 5s
      retries: 30
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build: .
    environment:
      DATABASE_URL: postgres://paperclip:${SERVICE_PASSWORD_POSTGRES}@db:5432/paperclip
      PORT: "3100"
      SERVE_UI: "true"
      PAPERCLIP_DEPLOYMENT_MODE: "authenticated"
      PAPERCLIP_DEPLOYMENT_EXPOSURE: "private"
      PAPERCLIP_AUTH_BASE_URL_MODE: "auto"
      HOST: "0.0.0.0"
      BETTER_AUTH_SECRET: "${SERVICE_PASSWORD_64_BETTERAUTH}"
      PAPERCLIP_AGENT_JWT_SECRET: "${SERVICE_PASSWORD_64_AGENTJWT}"
      # ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:?}"
      SERVICE_FQDN_SERVER_3100:
    volumes:
      - paperclip-data:/paperclip
    depends_on:
      db:
        condition: service_healthy
      tailscale:
        condition: service_started
    network_mode: service:tailscale
  
volumes:
  pgdata:
  paperclip-data:
