  #     - /dev/net/tun:/dev/net/tun
  #   cap_add:
  #     - net_admin
  #     - net_raw
  #   restart: unless-stopped
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: paperclip
      POSTGRES_PASSWORD: ${SERVICE_PASSWORD_POSTGRES}
      POSTGRES_DB: paperclip
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperclip -d paperclip"]
      interval: 2s
      timeout: 5s
      retries: 30
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build: .
    environment:
      DATABASE_URL: postgres://paperclip:${SERVICE_PASSWORD_POSTGRES}@db:5432/paperclip
      HOST: "127.0.0.1"
      PORT: "3100"
      SERVE_UI: "true"
      PAPERCLIP_DEPLOYMENT_MODE: "local_trusted"
      PAPERCLIP_AGENT_JWT_SECRET: "${SERVICE_PASSWORD_64_AGENTJWT}"
      # ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:?}"
      TS_AUTHKEY: "${TS_AUTHKEY:-}"
      TS_HOSTNAME: "${TS_HOSTNAME:-paperclip}"
      TS_EXTRA_ARGS: "${TS_EXTRA_ARGS:-}"
      TS_SERVE_PORT: "${TS_SERVE_PORT:-3100}"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3100/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    volumes:
      - paperclip-data:/paperclip
      - tailscale-state:/var/lib/tailscale
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  paperclip-data:
  tailscale-state:
