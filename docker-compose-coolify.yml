  #   environment:
  #     - TS_AUTHKEY=${TS_AUTH_KEY}
  #     - TS_EXTRA_ARGS=--advertise-tags=tag:container --allowed-hostname=100.69.35.53
  #     - TS_STATE_DIR=/var/lib/tailscale
